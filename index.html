<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>麺Earth MAP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700;900&display=swap');

:root {
  --grass: #6fae3e;
  --grass-dark: #4f7f2c;
  --dirt: #8b6a4a;
  --dirt-dark: #5c4a33;
  --stone: #8a8a8a;
  --stone-dark: #545454;
  --obsidian: #0d0f0d;
  --panel-bg: #1a1d16;
  --panel-border: #3a3f2e;
  --gold: #f0c419;
  --gold-dark: #b8941a;
  --diamond: #4fd1e8;
  --redstone: #c0392b;
  --redstone-dark: #7a1f16;
  --emerald: #2ecc71;
  --text-main: #e8e6d8;
  --text-dim: #8a9478;
  --font-pixel: 'Press Start 2P', monospace;
  --font-body: 'Noto Sans JP', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: var(--obsidian);
  background-image:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    repeating-linear-gradient(0deg, #14170f 0px, #14170f 2px, #171a12 2px, #171a12 4px);
  color: var(--text-main);
  font-family: var(--font-body);
  overflow: hidden;
}
body { display: flex; flex-direction: column; }

/* ===== Minecraftっぽいボタン共通(立体枠) ===== */
.mc-btn {
  font-family: var(--font-pixel);
  font-size: 10px;
  letter-spacing: 0.5px;
  line-height: 1.6;
  color: #fff;
  background: var(--stone);
  border-top: 3px solid #c9c9c9;
  border-left: 3px solid #c9c9c9;
  border-right: 3px solid #4a4a4a;
  border-bottom: 3px solid #4a4a4a;
  border-radius: 0;
  padding: 8px 10px;
  text-shadow: 1px 1px 0 #000;
  cursor: pointer;
  transition: transform .05s;
  image-rendering: pixelated;
}
.mc-btn:active {
  border-top: 3px solid #4a4a4a;
  border-left: 3px solid #4a4a4a;
  border-right: 3px solid #c9c9c9;
  border-bottom: 3px solid #c9c9c9;
  transform: translateY(1px);
}
.mc-btn.grass { background: var(--grass); border-top-color:#9ed46e; border-left-color:#9ed46e; border-right-color:var(--grass-dark); border-bottom-color:var(--grass-dark); }
.mc-btn.redstone { background: var(--redstone); border-top-color:#e0685a; border-left-color:#e0685a; border-right-color:var(--redstone-dark); border-bottom-color:var(--redstone-dark); }
.mc-btn.diamond { background: #2a7f92; border-top-color:var(--diamond); border-left-color:var(--diamond); border-right-color:#1a4f5c; border-bottom-color:#1a4f5c; }
.mc-btn.dirt { background: var(--dirt); border-top-color:#a98a63; border-left-color:#a98a63; border-right-color:var(--dirt-dark); border-bottom-color:var(--dirt-dark); }

/* ===== ヘッダー: クラフトテーブル風 ===== */
#error-banner {
  display: none;
  font-family: var(--font-pixel);
  font-size: 11px;
  letter-spacing: 0.5px;
  color: #fff;
  padding: 12px 14px;
  text-align: center;
  flex: 0 0 auto;
  text-shadow: 1px 1px 0 #000;
  border-bottom: 3px solid rgba(0,0,0,0.4);
}

#header {
  flex: 0 0 auto;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.15)),
    var(--dirt-dark);
  border-bottom: 4px solid var(--gold-dark);
  box-shadow: 0 3px 0 rgba(0,0,0,0.3);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#header .logo {
  font-family: var(--font-pixel);
  font-size: 14px;
  color: var(--gold);
  text-shadow: 2px 2px 0 #000, 0 0 8px rgba(240,196,25,0.4);
  white-space: nowrap;
  letter-spacing: 1px;
}
#header .logo::before { content: '\26cf\fe0e '; }
#hdr-info {
  flex: 1;
  background: rgba(0,0,0,0.45);
  border: 2px solid var(--panel-border);
  border-radius: 3px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--emerald);
  text-align: center;
  font-family: 'Noto Sans JP', monospace;
  letter-spacing: 0.5px;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== マップエリア ===== */
#map-area {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at center, #12233a 0%, #060a12 100%);
  min-height: 0;
  border-bottom: 3px solid #000;
}
#map-img {
  position: absolute;
  image-rendering: pixelated;
  display: block;
  box-shadow: 0 0 40px rgba(0,0,0,0.6) inset;
}
#tap-mark {
  position: absolute;
  width: 22px;
  height: 22px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  display: none;
  z-index: 10;
  filter: drop-shadow(0 0 3px #000);
}
#tap-mark::before, #tap-mark::after {
  content: '';
  position: absolute;
  background: var(--emerald);
}
#tap-mark::before { left: 50%; top: 0; width: 3px; height: 100%; transform: translateX(-50%); }
#tap-mark::after { top: 50%; left: 0; width: 100%; height: 3px; transform: translateY(-50%); }

#jump-mark {
  position: absolute;
  width: 26px;
  height: 26px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  display: none;
  z-index: 15;
  filter: drop-shadow(0 0 4px #000);
}
#jump-mark::before, #jump-mark::after {
  content: '';
  position: absolute;
  background: var(--redstone);
  border-radius: 1px;
  box-shadow: 0 0 6px rgba(192,57,43,0.8);
}
#jump-mark::before { left: 50%; top: 0; width: 4px; height: 26px; transform: translateX(-50%); }
#jump-mark::after { top: 50%; left: 0; width: 26px; height: 4px; transform: translateY(-50%); }

.player-mark {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
  z-index: 20;
}
.player-mark .label {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: #fff;
  background: rgba(0,0,0,0.75);
  padding: 3px 6px;
  border-radius: 2px;
  margin-bottom: 4px;
  white-space: nowrap;
  text-shadow: 1px 1px 0 #000;
  border: 1px solid var(--gold-dark);
}
.player-mark .icon {
  width: 32px;
  height: 32px;
  border: 3px solid var(--gold);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 900;
  font-size: 16px;
  text-shadow: 1px 1px 0 #000;
  box-shadow: 0 0 10px rgba(240,196,25,0.5), 0 3px 6px rgba(0,0,0,0.5);
}

#tooltip {
  position: absolute;
  background: rgba(10,14,10,0.95);
  border: 2px solid var(--emerald);
  color: var(--emerald);
  font-family: var(--font-pixel);
  font-size: 9px;
  padding: 6px 10px;
  border-radius: 3px;
  pointer-events: none;
  display: none;
  z-index: 30;
  white-space: nowrap;
  text-shadow: 1px 1px 0 #000;
}

/* ===== パネル ===== */
#panel {
  flex: 0 0 auto;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.1)),
    var(--panel-bg);
  border-top: 4px solid var(--panel-border);
  padding: 10px 12px 12px;
}
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.tab-btn {
  flex: 1;
  font-family: var(--font-pixel);
  font-size: 12px;
  letter-spacing: 0.5px;
  padding: 14px 10px;
  color: #cfd6c4;
  text-shadow: 1px 1px 0 #000;
  background: var(--stone-dark);
  border-top: 3px solid #6e6e6e;
  border-left: 3px solid #6e6e6e;
  border-right: 3px solid #2c2c2c;
  border-bottom: 5px solid #2c2c2c;
  border-radius: 2px;
  transition: transform .05s, filter .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tab-btn:active { transform: translateY(2px); border-bottom-width: 3px; }
.tab-btn .tab-icon { font-size: 16px; }
.tab-btn.active {
  color: #fff;
  background: var(--grass);
  border-top-color: #9ed46e;
  border-left-color: #9ed46e;
  border-right-color: var(--grass-dark);
  border-bottom-color: var(--grass-dark);
  box-shadow: 0 0 14px rgba(111,174,62,0.55);
  transform: translateY(-1px);
}
.tab-content { display: none; flex-direction: column; gap: 8px; }
.tab-content.active { display: flex; }

.field-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-label {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--gold);
  text-shadow: 1px 1px 0 #000;
  letter-spacing: 0.5px;
}
input[type="text"], input[type="number"] {
  background: #0a0d08;
  border: 2px solid var(--panel-border);
  color: var(--text-main);
  font-family: var(--font-body);
  font-size: 15px;
  padding: 8px 10px;
  border-radius: 2px;
  width: 100px;
}
input[type="text"]:focus, input[type="number"]:focus {
  outline: none;
  border-color: var(--emerald);
  box-shadow: 0 0 0 2px rgba(46,204,113,0.25);
}

.action-btn {
  font-family: var(--font-pixel);
  font-size: 10px;
  letter-spacing: 0.5px;
  color: #fff;
  padding: 10px 14px;
  border-radius: 0;
  text-shadow: 1px 1px 0 #000;
  cursor: pointer;
  transition: transform .05s;
}
.action-btn:active { transform: translateY(1px); }
.action-btn {
  background: var(--grass);
  border-top: 3px solid #9ed46e;
  border-left: 3px solid #9ed46e;
  border-right: 3px solid var(--grass-dark);
  border-bottom: 3px solid var(--grass-dark);
}
.action-btn.secondary {
  background: var(--stone);
  border-top: 3px solid #c9c9c9;
  border-left: 3px solid #c9c9c9;
  border-right: 3px solid var(--stone-dark);
  border-bottom: 3px solid var(--stone-dark);
}
.action-btn.danger {
  background: var(--redstone);
  border-top: 3px solid #e0685a;
  border-left: 3px solid #e0685a;
  border-right: 3px solid var(--redstone-dark);
  border-bottom: 3px solid var(--redstone-dark);
}
.action-btn.jump {
  background: #2a7f92;
  border-top: 3px solid var(--diamond);
  border-left: 3px solid var(--diamond);
  border-right: 3px solid #1a4f5c;
  border-bottom: 3px solid #1a4f5c;
}

.info-chip {
  font-family: var(--font-body);
  font-size: 12px;
  background: rgba(0,0,0,0.4);
  border: 2px solid var(--panel-border);
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: 3px;
}
.info-chip b { color: var(--gold); }

/* ===== ズームコントロール ===== */
#zoom-controls {
  position: absolute;
  right: 12px;
  bottom: 12px;
  z-index: 25;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.zoom-btn {
  width: 44px;
  height: 44px;
  font-family: var(--font-pixel);
  font-size: 20px;
  line-height: 1;
  color: #fff;
  background: var(--stone);
  border-top: 3px solid #c9c9c9;
  border-left: 3px solid #c9c9c9;
  border-right: 3px solid #4a4a4a;
  border-bottom: 3px solid #4a4a4a;
  text-shadow: 1px 1px 0 #000;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .05s;
  user-select: none;
  touch-action: manipulation;
}
.zoom-btn:active {
  border-top: 3px solid #4a4a4a;
  border-left: 3px solid #4a4a4a;
  border-right: 3px solid #c9c9c9;
  border-bottom: 3px solid #c9c9c9;
  transform: translateY(1px);
}


</style>
</head>

  <div class="logo">麺Earth</div>
  <div id="hdr-info">マップをタップしてください</div>

<script>
'use strict';

// ===== 定数 =====
var MAP_BOUNDS = { x1: -9215, z1: -4607, x2: 9215, z2: 4607 };
var IMG_W = 1539, IMG_H = 769;
var CONV = { cx: 51.26, ox: -4, cz: 51.22, oz: 1 };

// ===== 座標変換 =====
function mcToGeo(x, z) {
  return {
    lat: (-(z - CONV.oz) / CONV.cz).toFixed(4),
    lng: ((x - CONV.ox) / CONV.cx).toFixed(4)
  };
}

// ===== ビュー状態 =====
var view = { x: 0, y: 0, scale: 1 };

// ===== DOM要素 =====
var mapArea = document.getElementById('map-area');
var mapImg = document.getElementById('map-img');
var tapMark = document.getElementById('tap-mark');
var jumpMark = document.getElementById('jump-mark');
var tooltip = document.getElementById('tooltip');
var hdrInfo = document.getElementById('hdr-info');
var playerInfo = document.getElementById('player-info');

// ===== ビュー計算 =====
function fitView() {
  var rect = mapArea.getBoundingClientRect();
  if (rect.width <= 0 || rect.height <= 0) return;
  var sx = rect.width / IMG_W;
  var sy = rect.height / IMG_H;
  view.scale = Math.min(sx, sy);
  view.x = (rect.width - IMG_W * view.scale) / 2;
  view.y = (rect.height - IMG_H * view.scale) / 2;
  applyView();
}

function applyView() {
  mapImg.style.width = (IMG_W * view.scale) + 'px';
  mapImg.style.height = (IMG_H * view.scale) + 'px';
  mapImg.style.left = view.x + 'px';
  mapImg.style.top = view.y + 'px';
  updateMarkerPositions();
}

function clampView() {
  var rect = mapArea.getBoundingClientRect();
  var cw = IMG_W * view.scale;
  var ch = IMG_H * view.scale;
  if (cw <= rect.width) {
    view.x = (rect.width - cw) / 2;
  } else {
    if (view.x > 0) view.x = 0;
    if (view.x < rect.width - cw) view.x = rect.width - cw;
  }
  if (ch <= rect.height) {
    view.y = (rect.height - ch) / 2;
  } else {
    if (view.y > 0) view.y = 0;
    if (view.y < rect.height - ch) view.y = rect.height - ch;
  }
}

// MC座標 -> map-area内ピクセル座標
function mcToPixel(mcX, mcZ) {
  var rx = (mcX - MAP_BOUNDS.x1) / (MAP_BOUNDS.x2 - MAP_BOUNDS.x1);
  var rz = (mcZ - MAP_BOUNDS.z1) / (MAP_BOUNDS.z2 - MAP_BOUNDS.z1);
  return {
    x: view.x + rx * IMG_W * view.scale,
    y: view.y + rz * IMG_H * view.scale
  };
}

// map-area内ピクセル座標 -> MC座標
function pixelToMc(px, py) {
  var rx = (px - view.x) / (IMG_W * view.scale);
  var rz = (py - view.y) / (IMG_H * view.scale);
  return {
    x: Math.round(MAP_BOUNDS.x1 + rx * (MAP_BOUNDS.x2 - MAP_BOUNDS.x1)),
    z: Math.round(MAP_BOUNDS.z1 + rz * (MAP_BOUNDS.z2 - MAP_BOUNDS.z1))
  };
}

// ===== エラー表示 =====
var errorBanner = document.getElementById('error-banner');
var errorTimer = null;
function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.background = '#c0392b';
  errorBanner.style.display = 'block';
  if (errorTimer) clearTimeout(errorTimer);
  errorTimer = setTimeout(function () { errorBanner.style.display = 'none'; }, 5000);
}
function showSuccess(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.background = '#4f7f2c';
  errorBanner.style.display = 'block';
  if (errorTimer) clearTimeout(errorTimer);
  errorTimer = setTimeout(function () { errorBanner.style.display = 'none'; }, 3000);
}

// ===== プレイヤーマーカー =====
var playerMarkerEl = null;
var currentPlayerMc = null;

function isValidMcid(id) {
  return /^[A-Za-z0-9_]{3,16}$/.test(id);
}

function placePlayer() {
  var idRaw = document.getElementById('input-mcid').value;
  var id = idRaw.trim();
  var xStr = document.getElementById('input-px').value;
  var zStr = document.getElementById('input-pz').value;
  var x = parseFloat(xStr);
  var z = parseFloat(zStr);

  if (id.length === 0) {
    showError('MCID欄が空です。入力してください。');
    return;
  }
  if (!isValidMcid(id)) {
    showError('MCID「' + id + '」は使用できません。半角英数字とアンダースコアのみ、3〜16文字で入力してください。');
    return;
  }
  if (isNaN(x) || isNaN(z)) {
    showError('X座標とZ座標を数字で入力してください。');
    return;
  }

  currentPlayerMc = { x: x, z: z };

  if (playerMarkerEl) {
    playerMarkerEl.parentNode.removeChild(playerMarkerEl);
    playerMarkerEl = null;
  }
  jumpMark.style.display = 'none';

  var el = document.createElement('div');
  el.className = 'player-mark';

  var label = document.createElement('div');
  label.className = 'label';
  label.textContent = id;

  var icon = document.createElement('div');
  icon.className = 'icon';
  icon.textContent = id.charAt(0).toUpperCase();
  var hue = 0;
  for (var i = 0; i < id.length; i++) { hue = (hue + id.charCodeAt(i) * 7) % 360; }
  icon.style.background = 'hsl(' + hue + ',55%,40%)';

  el.appendChild(label);
  el.appendChild(icon);
  mapArea.appendChild(el);
  playerMarkerEl = el;

  var geo = mcToGeo(x, z);
  playerInfo.innerHTML = '<b>' + escapeHtml(id) + '</b> X:' + x + ' Z:' + z + ' (' + geo.lat + '\u00b0N, ' + geo.lng + '\u00b0E)';
  showSuccess('配置しました: ' + id);

  updateMarkerPositions();
}

function removePlayer() {
  if (playerMarkerEl) {
    playerMarkerEl.parentNode.removeChild(playerMarkerEl);
    playerMarkerEl = null;
  }
  currentPlayerMc = null;
  playerInfo.textContent = 'マーカー未配置';
}

// ===== ジャンプ =====
var currentJumpMc = null;

function doJumpTo() {
  var xStr = document.getElementById('input-jx').value;
  var zStr = document.getElementById('input-jz').value;
  var x = parseFloat(xStr);
  var z = parseFloat(zStr);
  if (isNaN(x) || isNaN(z)) {
    showError('X座標とZ座標を数字で入力してください。');
    return;
  }
  currentJumpMc = { x: x, z: z };

  var rect = mapArea.getBoundingClientRect();
  if (view.scale < 4) view.scale = 4;
  var rx = (x - MAP_BOUNDS.x1) / (MAP_BOUNDS.x2 - MAP_BOUNDS.x1);
  var rz = (z - MAP_BOUNDS.z1) / (MAP_BOUNDS.z2 - MAP_BOUNDS.z1);
  view.x = rect.width / 2 - rx * IMG_W * view.scale;
  view.y = rect.height / 2 - rz * IMG_H * view.scale;
  applyView();

  var geo = mcToGeo(x, z);
  hdrInfo.textContent = 'X:' + x + ' Z:' + z + ' | ' + geo.lat + '\u00b0N ' + geo.lng + '\u00b0E';
}

function updateMarkerPositions() {
  if (playerMarkerEl && currentPlayerMc) {
    var p = mcToPixel(currentPlayerMc.x, currentPlayerMc.z);
    playerMarkerEl.style.left = p.x + 'px';
    playerMarkerEl.style.top = p.y + 'px';
  }
  if (currentJumpMc && jumpMark.style.display !== 'none') {
    var jp = mcToPixel(currentJumpMc.x, currentJumpMc.z);
    jumpMark.style.left = jp.x + 'px';
    jumpMark.style.top = jp.y + 'px';
  }
}

function showJumpMark() {
  if (!currentJumpMc) return;
  var p = mcToPixel(currentJumpMc.x, currentJumpMc.z);
  jumpMark.style.display = 'block';
  jumpMark.style.left = p.x + 'px';
  jumpMark.style.top = p.y + 'px';
}

// ===== タップで座標表示 =====
var tooltipTimer = null;
function onMapTap(clientX, clientY) {
  var rect = mapArea.getBoundingClientRect();
  var lx = clientX - rect.left;
  var ly = clientY - rect.top;
  var imgLeft = view.x, imgTop = view.y;
  var imgRight = view.x + IMG_W * view.scale;
  var imgBottom = view.y + IMG_H * view.scale;
  if (lx < imgLeft || lx > imgRight || ly < imgTop || ly > imgBottom) return;

  tapMark.style.display = 'block';
  tapMark.style.left = lx + 'px';
  tapMark.style.top = ly + 'px';

  var mc = pixelToMc(lx, ly);
  var geo = mcToGeo(mc.x, mc.z);
  hdrInfo.textContent = 'X:' + mc.x + ' Z:' + mc.z + ' | ' + geo.lat + '\u00b0N ' + geo.lng + '\u00b0E';

  tooltip.textContent = 'X:' + mc.x + ' Z:' + mc.z;
  tooltip.style.display = 'block';
  var tx = lx + 12, ty = ly - 30;
  if (tx + 150 > rect.width) tx = lx - 160;
  if (ty < 0) ty = ly + 14;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';

  if (tooltipTimer) clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(function () { tooltip.style.display = 'none'; }, 2500);
}

// ===== タブ切り替え =====
function switchTab(name) {
  var buttons = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < buttons.length; i++) {
    if (buttons[i].getAttribute('data-tab') === name) {
      buttons[i].classList.add('active');
    } else {
      buttons[i].classList.remove('active');
    }
  }
  var contents = document.querySelectorAll('.tab-content');
  for (var j = 0; j < contents.length; j++) {
    contents[j].classList.remove('active');
  }
  document.getElementById('tab-' + name).classList.add('active');
}

// ===== ユーティリティ =====
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== タッチ/マウス操作 =====
var pointers = {};
var panActive = false, panLastX = 0, panLastY = 0;
var pinchActive = false, pinchDist = 0, pinchMidX = 0, pinchMidY = 0;
var isTap = false, tapStartX = 0, tapStartY = 0, tapStartTime = 0;

function onTouchStart(e) {
  e.preventDefault();
  var touches = e.changedTouches;
  for (var i = 0; i < touches.length; i++) {
    pointers[touches[i].identifier] = { x: touches[i].clientX, y: touches[i].clientY };
  }
  var keys = Object.keys(pointers);
  if (keys.length === 1) {
    var p = pointers[keys[0]];
    panActive = true; pinchActive = false;
    panLastX = p.x; panLastY = p.y;
    isTap = true; tapStartX = p.x; tapStartY = p.y; tapStartTime = Date.now();
  } else if (keys.length === 2) {
    panActive = false; pinchActive = true; isTap = false;
    var p0 = pointers[keys[0]], p1 = pointers[keys[1]];
    pinchDist = Math.hypot(p1.x - p0.x, p1.y - p0.y);
    pinchMidX = (p0.x + p1.x) / 2;
    pinchMidY = (p0.y + p1.y) / 2;
  }
}

function onTouchMove(e) {
  e.preventDefault();
  var touches = e.changedTouches;
  for (var i = 0; i < touches.length; i++) {
    pointers[touches[i].identifier] = { x: touches[i].clientX, y: touches[i].clientY };
  }
  var keys = Object.keys(pointers);
  if (keys.length === 1 && panActive) {
    var p = pointers[keys[0]];
    var dx = p.x - panLastX, dy = p.y - panLastY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isTap = false;
    view.x += dx; view.y += dy;
    panLastX = p.x; panLastY = p.y;
    clampView(); applyView();
  } else if (keys.length === 2 && pinchActive) {
    var p0 = pointers[keys[0]], p1 = pointers[keys[1]];
    var dist = Math.hypot(p1.x - p0.x, p1.y - p0.y);
    var midX = (p0.x + p1.x) / 2, midY = (p0.y + p1.y) / 2;
    var rect = mapArea.getBoundingClientRect();
    var prevOx = pinchMidX - rect.left, prevOy = pinchMidY - rect.top;
    var minScale = Math.min(rect.width / IMG_W, rect.height / IMG_H);
    var newScale = Math.min(Math.max(view.scale * dist / pinchDist, minScale), 15);
    view.x = prevOx - (prevOx - view.x) * (newScale / view.scale);
    view.y = prevOy - (prevOy - view.y) * (newScale / view.scale);
    view.scale = newScale;
    view.x += (midX - pinchMidX);
    view.y += (midY - pinchMidY);
    pinchDist = dist; pinchMidX = midX; pinchMidY = midY;
    clampView(); applyView();
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  var touches = e.changedTouches;
  for (var i = 0; i < touches.length; i++) {
    delete pointers[touches[i].identifier];
  }
  var remaining = Object.keys(pointers).length;
  if (remaining === 0) {
    if (isTap && (Date.now() - tapStartTime) < 300) {
      onMapTap(tapStartX, tapStartY);
    }
    panActive = false; pinchActive = false; isTap = false;
  } else if (remaining === 1) {
    pinchActive = false; panActive = true; isTap = false;
    var lastKey = Object.keys(pointers)[0];
    panLastX = pointers[lastKey].x; panLastY = pointers[lastKey].y;
  }
}

function onTouchCancel(e) {
  var touches = e.changedTouches;
  for (var i = 0; i < touches.length; i++) {
    delete pointers[touches[i].identifier];
  }
  panActive = false; pinchActive = false; isTap = false;
}

// マウスクリックでもタップ扱い（PC確認用、ドラッグ後は無視）
mapArea.addEventListener('click', function (e) {
  if (mouseMoved) { mouseMoved = false; return; }
  onMapTap(e.clientX, e.clientY);
});

mapArea.addEventListener('touchstart', onTouchStart, { passive: false });
mapArea.addEventListener('touchmove', onTouchMove, { passive: false });
mapArea.addEventListener('touchend', onTouchEnd, { passive: false });
mapArea.addEventListener('touchcancel', onTouchCancel, { passive: false });

// ===== ボタン結線（addEventListenerで確実に） =====
document.getElementById('btn-place').addEventListener('click', placePlayer);
document.getElementById('btn-remove').addEventListener('click', removePlayer);
document.getElementById('btn-jump').addEventListener('click', function () {
  doJumpTo();
  showJumpMark();
});

var tabButtons = document.querySelectorAll('.tab-btn');
for (var t = 0; t < tabButtons.length; t++) {
  tabButtons[t].addEventListener('click', function () {
    switchTab(this.getAttribute('data-tab'));
  });
}

// ===== PC: マウスホイールでズーム =====
mapArea.addEventListener('wheel', function (e) {
  e.preventDefault();
  var rect = mapArea.getBoundingClientRect();
  var ox = e.clientX - rect.left;
  var oy = e.clientY - rect.top;
  var minScale = Math.min(rect.width / IMG_W, rect.height / IMG_H);
  var factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  var newScale = Math.min(Math.max(view.scale * factor, minScale), 15);
  view.x = ox - (ox - view.x) * (newScale / view.scale);
  view.y = oy - (oy - view.y) * (newScale / view.scale);
  view.scale = newScale;
  clampView();
  applyView();
}, { passive: false });

// ===== PC: マウスドラッグでパン =====
var mouseDragging = false;
var mouseLastX = 0, mouseLastY = 0;
var mouseMoved = false;

mapArea.addEventListener('mousedown', function (e) {
  mouseDragging = true;
  mouseMoved = false;
  mouseLastX = e.clientX;
  mouseLastY = e.clientY;
});

window.addEventListener('mousemove', function (e) {
  if (!mouseDragging) return;
  var dx = e.clientX - mouseLastX;
  var dy = e.clientY - mouseLastY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mouseMoved = true;
  view.x += dx;
  view.y += dy;
  mouseLastX = e.clientX;
  mouseLastY = e.clientY;
  clampView();
  applyView();
});

window.addEventListener('mouseup', function () {
  mouseDragging = false;
});

// ===== ズームボタン（PC・スマホ共通） =====
function zoomBy(factor) {
  var rect = mapArea.getBoundingClientRect();
  var ox = rect.width / 2;
  var oy = rect.height / 2;
  var minScale = Math.min(rect.width / IMG_W, rect.height / IMG_H);
  var newScale = Math.min(Math.max(view.scale * factor, minScale), 15);
  view.x = ox - (ox - view.x) * (newScale / view.scale);
  view.y = oy - (oy - view.y) * (newScale / view.scale);
  view.scale = newScale;
  clampView();
  applyView();
}

document.getElementById('zoom-in').addEventListener('click', function () {
  zoomBy(1.4);
});
document.getElementById('zoom-out').addEventListener('click', function () {
  zoomBy(1 / 1.4);
});

// ===== 初期化 =====
window.addEventListener('resize', fitView);
window.addEventListener('load', function () {
  fitView();
  setTimeout(fitView, 50);
  setTimeout(fitView, 200);
});
if (mapImg.complete) {
  fitView();
} else {
  mapImg.addEventListener('load', fitView);
}
</script>
